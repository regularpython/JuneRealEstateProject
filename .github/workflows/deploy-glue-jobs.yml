name: Deploy Glue Jobs to S3

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload Bronze Job
        run: |
          aws s3 cp glue_jobs/bronze_layer.py \
          s3://june-bucket-lambda-delete/glue-jobs/bronze_layer.py

      - name: Upload Silver Job
        run: |
          aws s3 cp glue_jobs/silver.py \
          s3://june-bucket-lambda-delete/glue-jobs/silver.py

      - name: Upload Gold Job
        run: |
          aws s3 cp glue_jobs/gold.py \
          s3://june-bucket-lambda-delete/glue-jobs/gold.py

      - name: Verify Upload
        run: |
          aws s3 ls s3://june-bucket-lambda-delete/glue-jobs/